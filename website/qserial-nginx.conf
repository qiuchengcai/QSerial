server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/qnote.echomcp.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qnote.echomcp.cn/privkey.pem;

    location /qserial {
        alias /opt/qserial/website;
        index index.html;
        try_files $uri $uri/ /qserial/index.html;
    }

    location /mcp {
        proxy_pass http://127.0.0.1:3722;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3721;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}