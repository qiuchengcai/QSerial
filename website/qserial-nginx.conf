# QSerial 独立站点 — qserial.echomcp.cn
# 部署路径: /etc/nginx/sites-available/qserial
# 启用方式: ln -s /etc/nginx/sites-available/qserial /etc/nginx/sites-enabled/qserial

server {
    listen 80;
    server_name qserial.echomcp.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name qserial.echomcp.cn;

    ssl_certificate /etc/letsencrypt/live/qserial.echomcp.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qserial.echomcp.cn/privkey.pem;

    root /opt/qserial/website;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /qserial/ {
        return 301 https://qserial.echomcp.cn/;
    }
}
