<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d23"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- 圆形背景底 -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- 终端窗口外框 -->
  <rect x="96" y="116" width="320" height="280" rx="20" fill="#161b22" stroke="#58a6ff" stroke-width="3"/>

  <!-- 窗口标题栏圆点 -->
  <circle cx="128" cy="150" r="8" fill="#ff5f57"/>
  <circle cx="156" cy="150" r="8" fill="#febc2e"/>
  <circle cx="184" cy="150" r="8" fill="#29c840"/>

  <!-- 窗口标题 -->
  <text x="256" y="156" font-family="monospace" font-size="18" fill="#6e7681" text-anchor="middle" font-weight="500">QSerial</text>

  <!-- 命令行区域 -->
  <!-- 第一行：提示符 -->
  <text x="120" y="210" font-family="monospace" font-size="22" fill="#58a6ff" font-weight="600">$&gt;</text>
  <text x="150" y="210" font-family="monospace" font-size="22" fill="#e6edf3">serial connect</text>

  <!-- 第二行：输出 -->
  <text x="120" y="248" font-family="monospace" font-size="22" fill="#3fb950">✓ COM3 connected</text>

  <!-- 第三行：提示符 + 闪烁光标 -->
  <text x="120" y="286" font-family="monospace" font-size="22" fill="#58a6ff" font-weight="600">$&gt;</text>
  <rect x="150" y="272" width="3" height="20" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- 串口连接器暗示（底部） -->
  <rect x="196" y="340" width="120" height="4" rx="2" fill="#30363d"/>
  <rect x="216" y="336" width="80" height="12" rx="3" fill="none" stroke="#30363d" stroke-width="2"/>
  <circle cx="236" cy="342" r="2" fill="#21262d"/>
  <circle cx="256" cy="342" r="2" fill="#21262d"/>
  <circle cx="276" cy="342" r="2" fill="#21262d"/>
</svg>
