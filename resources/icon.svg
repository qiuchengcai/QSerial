<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 圆角方形背景 -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="#0d1117"/>

  <!-- 终端窗口外框 -->
  <rect x="96" y="128" width="320" height="256" rx="32" stroke="#58a6ff" stroke-width="6" fill="none"/>

  <!-- 顶部三个圆点（串口/状态灯） -->
  <circle cx="148" cy="172" r="10" fill="#58a6ff" opacity="0.5"/>
  <circle cx="188" cy="172" r="10" fill="#58a6ff" opacity="0.5"/>
  <circle cx="228" cy="172" r="10" fill="#58a6ff" opacity="0.5"/>

  <!-- 终端提示符箭头 -->
